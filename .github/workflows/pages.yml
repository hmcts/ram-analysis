name: Deploy docs to GitHub Pages

# Deterministic Pages deploy from the pre-built static site in docs/.
# Replaces GitHub's auto-injected branch-based "pages build and deployment"
# workflow — this one uploads docs/ as-is (no Jekyll) and controls permissions
# and the github-pages environment explicitly.
#
# Prerequisite: Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
# The docs/ HTML is generated by scripts/build-html.sh and committed to the repo.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Least-privilege token: read the repo, write Pages, mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is pre-built and committed; upload it verbatim.
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
